# Streamlit Secrets Configuration
# File location: ~/.streamlit/secrets.toml (or .streamlit/secrets.toml)
# This file contains sensitive configuration - DO NOT COMMIT TO GIT

# Backend API Configuration
BACKEND_URL = "http://localhost:8000"
BACKEND_TIMEOUT = 30

# Frontend Configuration
APP_TITLE = "Spotify Churn Prediction"
APP_VERSION = "1.0.0"

# Logging
LOG_LEVEL = "INFO"

# Optional: Authentication
# AUTH_USERNAME = "admin"
# AUTH_PASSWORD = "secure_password"

# Optional: Database (for storing chat history)
# DATABASE_URL = "sqlite:///./streamlit_app.db"

# Optional: Analytics
# ANALYTICS_ENABLED = false
# SENTRY_DSN = ""

# Note:
# 1. For local development, create .streamlit/secrets.toml
# 2. For Streamlit Cloud, use the secrets management in the dashboard
# 3. Never commit actual secrets to GitHub
