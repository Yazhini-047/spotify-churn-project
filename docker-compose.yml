version: '3.9'

services:
  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spotify_churn_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:spotify123@postgres:5432/spotify_churn
      ENVIRONMENT: production
      LOG_LEVEL: info
      WORKERS: 4
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - spotify_network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: spotify_churn_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: spotify123
      POSTGRES_DB: spotify_churn
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - spotify_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (Optional, for session management)
  redis:
    image: redis:7-alpine
    container_name: spotify_churn_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - spotify_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Adminer (Database Management UI)
  adminer:
    image: adminer
    container_name: spotify_churn_adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - spotify_network
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  spotify_network:
    driver: bridge
